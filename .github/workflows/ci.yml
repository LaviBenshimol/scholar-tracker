name: CI

on:
  push:
    branches: [dev, staging, master]
  pull_request:
    branches: [staging, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: flake8
        run: flake8 src/ tests/ main.py
      - name: isort (check)
        run: isort --check-only src/ tests/ main.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        env:
          SCHOLAR_AUTHOR_ID: ""
          GROQ_API_KEY: ""
        run: pytest -v tests/
